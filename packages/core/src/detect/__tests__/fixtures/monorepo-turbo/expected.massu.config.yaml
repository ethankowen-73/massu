# Massu AI Configuration
# Generated by: npx massu init (schema_version=2, detection-driven)
# Documentation: https://massu.ai/docs/getting-started/configuration

schema_version: 2
project:
  name: monorepo-turbo
  root: auto
framework:
  type: typescript
  router: express
  orm: none
  ui: next
  languages:
    typescript:
      framework: next
      router: express
      ui: next
      source_dirs:
        - apps
paths:
  source: apps
  aliases:
    "@": apps
  monorepo_roots:
    - apps
toolPrefix: massu
domains:
  - name: api
  - name: web
rules: []
verification:
  typescript:
    test: cd apps && npm test
    type: cd apps && npx tsc --noEmit
    build: cd apps && npm run build
    lint: cd apps && npx eslint .
