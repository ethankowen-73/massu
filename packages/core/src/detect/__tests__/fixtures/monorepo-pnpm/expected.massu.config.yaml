# Massu AI Configuration
# Generated by: npx massu init (schema_version=2, detection-driven)
# Documentation: https://massu.ai/docs/getting-started/configuration

schema_version: 2
project:
  name: monorepo-pnpm
  root: auto
framework:
  type: typescript
  router: fastify
  orm: none
  ui: react
  languages:
    typescript:
      framework: fastify
      router: fastify
      ui: react
      source_dirs:
        - packages
paths:
  source: packages
  aliases:
    "@": packages
  monorepo_roots:
    - packages
toolPrefix: massu
domains:
  - name: server
  - name: ui
rules: []
verification:
  typescript:
    test: cd packages && npm test
    type: cd packages && npx tsc --noEmit
    build: cd packages && npm run build
    lint: cd packages && npx eslint .
