project:
  name: hedge
  root: auto
framework:
  type: typescript
  router: trpc
  orm: prisma
  ui: nextjs
paths:
  source: src
  aliases:
    "@": src
toolPrefix: hedge
domains:
  - name: Trading
    routers: [trading]
    pages: []
    tables: []
    allowedImportsFrom: []
rules:
  - pattern: src/**/*.ts
    rules:
      - Use ESM imports, not CommonJS
