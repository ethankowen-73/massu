# Massu AI Configuration
# Generated by: npx massu init (schema_version=2, detection-driven)
# Documentation: https://massu.ai/docs/getting-started/configuration

schema_version: 2
project:
  name: multi-runtime
  root: auto
framework:
  type: multi
  router: none
  orm: sqlalchemy
  ui: none
  primary: python
  languages:
    python:
      framework: fastapi
      test_framework: pytest
      orm: sqlalchemy
      source_dirs:
        - apps
    rust:
      framework: actix-web
      source_dirs:
        - apps
    swift:
      source_dirs:
        - apps
    typescript:
      framework: next
      test_framework: vitest
      ui: next
      source_dirs:
        - apps
paths:
  source: apps
  aliases:
    "@": apps
  monorepo_roots:
    - apps
toolPrefix: massu
domains:
  - name: api
  - name: gateway
  - name: Ios
  - name: web
rules: []
verification:
  python:
    test: cd apps && python3 -m pytest -q
    type: cd apps && python3 -m mypy .
    syntax: cd apps && python3 -m py_compile
    lint: cd apps && python3 -m ruff check .
  rust:
    test: cd apps && cargo test
    type: cd apps && cargo check
    build: cd apps && cargo build
    lint: cd apps && cargo clippy -- -D warnings
  swift:
    test: cd apps && swift test
    type: cd apps && swift build
    build: cd apps && xcodebuild build
    lint: cd apps && swiftlint
  typescript:
    test: cd apps && npm test
    type: cd apps && npx tsc --noEmit
    build: cd apps && npm run build
    lint: cd apps && npx eslint .
python:
  root: apps
  exclude_dirs:
    - __pycache__
    - .venv
    - venv
    - .mypy_cache
    - .pytest_cache
  framework: fastapi
  orm: sqlalchemy
