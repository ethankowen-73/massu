# Massu AI Configuration
# Generated by: npx massu init (schema_version=2, detection-driven)
# Documentation: https://massu.ai/docs/getting-started/configuration

schema_version: 2
project:
  name: monorepo-nx
  root: auto
framework:
  type: typescript
  router: none
  orm: none
  ui: react
  languages:
    typescript:
      framework: react
      ui: react
      source_dirs:
        - apps
        - libs
paths:
  source: apps
  aliases:
    "@": apps
toolPrefix: massu
domains:
  - name: ui
  - name: web
rules: []
verification:
  typescript:
    test: cd apps && npm test
    type: cd apps && npx tsc --noEmit
    build: cd apps && npm run build
    lint: cd apps && npx eslint .
