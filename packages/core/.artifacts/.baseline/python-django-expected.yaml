# Massu AI Configuration
# Generated by: npx massu init (schema_version=2, detection-driven)
# Documentation: https://massu.ai/docs/getting-started/configuration

schema_version: 2
project:
  name: python-django
  root: auto
framework:
  type: python
  router: none
  orm: none
  ui: none
  languages:
    python:
      framework: django
      test_framework: pytest
      source_dirs:
        - app
        - .
paths:
  source: app
  aliases:
    "@": app
toolPrefix: massu
domains:
  - name: Python
rules: []
verification:
  python:
    test: cd app && python3 -m pytest -q
    type: cd app && python3 -m mypy .
    syntax: cd app && python3 -m py_compile
    lint: cd app && python3 -m ruff check .
python:
  root: app
  exclude_dirs:
    - __pycache__
    - .venv
    - venv
    - .mypy_cache
    - .pytest_cache
  framework: django
