# Massu AI Configuration
# Generated by: npx massu init (schema_version=2, detection-driven)
# Documentation: https://massu.ai/docs/getting-started/configuration

schema_version: 2
project:
  name: python-fastapi
  root: auto
framework:
  type: python
  router: none
  orm: sqlalchemy
  ui: none
  languages:
    python:
      framework: fastapi
      test_framework: pytest
      orm: sqlalchemy
      source_dirs:
        - src
paths:
  source: src
  aliases:
    "@": src
toolPrefix: massu
domains:
  - name: App
rules: []
verification:
  python:
    test: cd src && python3 -m pytest -q
    type: cd src && python3 -m mypy .
    syntax: cd src && python3 -m py_compile
    lint: cd src && python3 -m ruff check .
python:
  root: src
  exclude_dirs:
    - __pycache__
    - .venv
    - venv
    - .mypy_cache
    - .pytest_cache
  framework: fastapi
  orm: sqlalchemy
