# Massu AI Configuration
# Generated by: npx massu init (schema_version=2, detection-driven)
# Documentation: https://massu.ai/docs/getting-started/configuration

schema_version: 2
project:
  name: massu
  root: auto
framework:
  type: multi
  router: none
  orm: none
  ui: none
  primary: javascript
  languages:
    javascript:
      source_dirs:
        - website
    typescript:
      test_framework: vitest
      source_dirs:
        - website
        - packages
        - scripts
paths:
  source: website
  aliases:
    "@": src
toolPrefix: massu
rules:
  - pattern: src/**/*.ts
    rules:
      - Use ESM imports (import/export), not CommonJS (require/module.exports)
      - All database operations go through better-sqlite3
  - pattern: src/hooks/**/*.ts
    rules:
      - Hooks receive JSON on stdin, output JSON on stdout
      - Hooks must exit within 5 seconds
      - Never import heavy dependencies - hooks must be fast
domains: []
analytics:
  quality:
    weights:
      bug_found: -5
      vr_failure: -10
      incident: -20
      cr_violation: -3
      vr_pass: 2
      clean_commit: 5
      successful_verification: 3
    categories:
      - security
      - architecture
      - coupling
      - tests
      - rule_compliance
  cost:
    models:
      claude-opus-4-6:
        input_per_million: 15
        output_per_million: 75
        cache_read_per_million: 1.5
        cache_write_per_million: 3.75
      claude-sonnet-4-5-20250929:
        input_per_million: 3
        output_per_million: 15
        cache_read_per_million: 0.3
        cache_write_per_million: 0.75
    currency: USD
  prompts:
    success_indicators:
      - committed
      - approved
      - looks good
      - perfect
      - great
      - thanks
    failure_indicators:
      - revert
      - wrong
      - that's not
      - undo
      - incorrect
    max_turns_for_success: 2
governance:
  audit:
    formats:
      - summary
      - detailed
      - soc2
    retention_days: 365
    auto_log:
      code_changes: true
      rule_enforcement: true
      approvals: true
      commits: true
  validation:
    realtime: true
    checks:
      rule_compliance: true
      import_existence: true
      naming_conventions: true
  adr:
    detection_phrases:
      - chose
      - decided
      - switching to
      - moving from
      - going with
    storage: database
security:
  auto_score_on_edit: true
  score_threshold_alert: 50
  severity_weights:
    critical: 25
    high: 15
    medium: 8
    low: 3
  restrictive_licenses:
    - GPL
    - AGPL
    - SSPL
  dependencies:
    package_manager: npm
    blocked_packages: []
    max_bundle_size_kb: 500
team:
  enabled: false
  sync_backend: local
  expertise_weights:
    session: 20
    observation: 10
  privacy:
    share_file_paths: true
    share_code_snippets: false
    share_observations: true
regression:
  test_runner: npm test
  test_patterns:
    - "{dir}/__tests__/{name}.test.{ext}"
    - "{dir}/{name}.spec.{ext}"
  health_thresholds:
    healthy: 80
    warning: 50
verification:
  javascript:
    test: cd website && npm test
    build: cd website && npm run build
    lint: cd website && npx eslint .
  typescript:
    test: cd website && npm test
    type: cd website && npx tsc --noEmit
    build: cd website && npm run build
    lint: cd website && npx eslint .
detection:
  fingerprint: e6efc2ff62e56a508b8bd9abb6c72b6fc781ce93b25e381b9f020952a3799424
